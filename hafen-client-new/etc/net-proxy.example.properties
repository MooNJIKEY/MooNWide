# Optional. If unset, the client uses direct TCP (login) and UDP (game).
#
# This file overrides Java prefs haven-net-game-chain / haven-net-auth-chain when set:
# copy to a path of your choice and set system property haven.net.proxyfile
# or preference haven-net-proxyfile to that path (full path string).
#
# In Options → Integrations you can edit the same chains as Java prefs (file wins if configured).
# haven-net-proxy-strict=true (default): drop "direct" hops when SOCKS/HTTP are present — all traffic stays on proxy.
#
# Login DPI workarounds (also in Options → Integrations); stock behavior = plain TLS first:
# haven-auth-dpi-obf-first=true
# haven-auth-dpi-split=true
# haven-auth-dpi-split-budget=6144
#
# Game traffic is UDP. SOCKS5 with UDP ASSOCIATE relays it; HTTP CONNECT is TCP-only (auth).
# Chains are tried left-to-right until a connection succeeds (failover).
# If auth.chain is omitted or empty here, game.chain is used for login too.

# Recommended explicit default (same as empty prefs):
game.chain=direct
auth.chain=direct

# Through a SOCKS5 proxy (UDP for game + TCP for login):
# game.chain=socks5://127.0.0.1:1080|direct
# auth.chain=

# More examples:
# game.chain=socks5://user:password@proxy.example.com:1080|direct
# auth.chain=http-connect://user:pass@corp-proxy:8080|direct
